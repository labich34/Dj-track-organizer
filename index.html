<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJVAULT — Music Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #c8ff00; --accent2: #ff6b35; --bg: #0a0a0a; --bg2: #111;
  --bg3: #1a1a1a; --border: #2a2a2a; --text: #e8e8e0; --muted: #666;
  --blue: #7ecaff; --red: #ff4444; --magenta: #ff00c8;
}
body { font-family: 'Courier New', Courier, monospace; background: var(--bg); color: var(--text); font-size: 13px; overflow: hidden; }
.app { display: grid; grid-template-columns: 230px 1fr; grid-template-rows: 52px 1fr; height: 100vh; }
.spacer { flex: 1; }
.topbar { grid-column: 1/-1; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; padding: 0 20px; }
.logo { font-size: 16px; font-weight: 700; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; white-space: nowrap; }
.logo span { color: var(--muted); font-weight: 400; font-size: 11px; }
.topbar-search { flex: 1; max-width: 360px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; font-family: inherit; font-size: 12px; outline: none; letter-spacing: 1px; }
.topbar-search:focus { border-color: var(--accent); }
.topbar-stats { margin-left: auto; display: flex; gap: 20px; font-size: 11px; color: var(--muted); letter-spacing: 2px; }
.topbar-stats span b { color: var(--accent); font-weight: 700; }
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px 0; }
.sidebar-section { padding: 0 16px; margin-bottom: 22px; }
.sidebar-section h2 { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); font-weight: 400; margin-bottom: 10px; }
.drop-zone { border: 2px dashed var(--border); padding: 16px; text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; line-height: 1.6; }
.drop-zone small { display: block; font-size: 10px; margin-top: 4px; }
.drop-zone:hover, .drop-zone.over { border-color: var(--accent); color: var(--accent); }
.progress-bar { height: 2px; background: var(--bg3); margin-top: 8px; }
.progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
.progress-text { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; min-height: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.range-row { display: flex; gap: 6px; align-items: center; }
.range-row input[type=number] { width: 62px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 6px; font-family: inherit; font-size: 12px; outline: none; }
.range-row input:focus { border-color: var(--accent); }
.range-sep { color: var(--muted); font-size: 11px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 4px; }
.chip { padding: 3px 8px; border: 1px solid var(--border); font-size: 11px; font-family: inherit; cursor: pointer; color: var(--muted); background: transparent; transition: all 0.15s; white-space: nowrap; }
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { border-color: var(--accent); color: #0a0a0a; background: var(--accent); font-weight: 700; }
.keys-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; margin-bottom: 4px; }
.key-chip { padding: 3px 0; border: 1px solid var(--border); font-size: 10px; font-family: inherit; cursor: pointer; color: var(--muted); background: transparent; text-align: center; transition: all 0.15s; }
.key-chip:hover { border-color: var(--blue); color: var(--blue); }
.key-chip.active { border-color: var(--blue); color: #0a0a0a; background: var(--blue); font-weight: 700; }
.camelot-hint { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
.playlist-item { padding: 6px 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 2px solid transparent; font-size: 12px; margin-bottom: 2px; transition: all 0.1s; }
.playlist-item:hover { background: var(--bg3); border-left-color: var(--border); }
.playlist-item.active { border-left-color: var(--accent); color: var(--accent); }
.playlist-count { font-size: 10px; color: var(--muted); background: var(--bg3); padding: 1px 6px; }
.pl-new { width: 100%; background: transparent; border: 1px dashed var(--border); color: var(--muted); padding: 5px 8px; font-family: inherit; font-size: 11px; cursor: pointer; text-align: left; letter-spacing: 1px; }
.pl-new:hover { border-color: var(--accent); color: var(--accent); }
.main { display: flex; flex-direction: column; overflow: hidden; }
.toolbar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--bg2); flex-wrap: wrap; }
.btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; font-family: inherit; font-size: 11px; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { border-color: var(--accent); color: var(--accent); }
.btn.magenta { border-color: var(--magenta); color: var(--magenta); }
.btn.magenta:hover { background: rgba(255, 0, 200, 0.1); }
.btn.danger:hover { border-color: var(--red); color: var(--red); }
.sort-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; }
.sort-btn { background: transparent; border: none; color: var(--muted); font-family: inherit; font-size: 11px; cursor: pointer; padding: 2px 6px; letter-spacing: 1px; }
.sort-btn:hover, .sort-btn.active { color: var(--accent); }
.select-bar { padding: 6px 16px; background: #0f1a00; border-bottom: 1px solid var(--accent); display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--accent); letter-spacing: 2px; }
.table-head { display: grid; grid-template-columns: 28px 1.7fr 1.1fr 0.55fr 0.5fr 0.55fr 0.7fr 0.85fr 88px; gap: 8px; padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; position: sticky; top: 0; background: var(--bg2); z-index: 2; }
.table-head span { cursor: pointer; }
.table-head span:hover { color: var(--accent); }
.tracks-wrap { flex: 1; overflow-y: auto; }
.track-row { display: grid; grid-template-columns: 28px 1.7fr 1.1fr 0.55fr 0.5fr 0.55fr 0.7fr 0.85fr 88px; gap: 8px; padding: 7px 16px; border-bottom: 1px solid #1a1a1a; align-items: center; transition: background 0.1s; }
.track-row:hover { background: var(--bg3); }
.track-row.selected { background: #1a1f0a; border-left: 2px solid var(--accent); }
.track-num { color: var(--muted); font-size: 11px; text-align: center; cursor: pointer; user-select: none; }
.track-title { overflow: hidden; }
.track-title b { display: block; font-size: 12px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-title small { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.track-artist { font-size: 11px; color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.bpm-badge { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
.key-badge { font-size: 11px; color: var(--blue); letter-spacing: 1px; }
.energy-bar { height: 6px; background: var(--bg3); position: relative; overflow: hidden; }
.energy-fill { height: 100%; transition: width 0.3s; }
.energy-num { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }
.genre-badge { font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 1px 5px; display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag-list { display: flex; gap: 3px; flex-wrap: wrap; overflow: hidden; }
.tag { font-size: 10px; padding: 1px 5px; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
.track-actions { display: flex; gap: 4px; justify-content: flex-end; }
.icon-btn { background: transparent; border: none; cursor: pointer; color: var(--muted); font-size: 12px; padding: 2px 4px; font-family: inherit; }
.icon-btn:hover { color: var(--accent); }
.empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.2; }
.empty p { font-size: 13px; letter-spacing: 3px; margin-bottom: 6px; }
.empty small { font-size: 11px; letter-spacing: 2px; }
.modal-bg { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.88); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg2); border: 1px solid var(--border); width: 540px; padding: 28px; max-height: 90vh; overflow-y: auto; }
.modal.wide { width: 720px; }
.modal h3 { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 22px; color: var(--accent); }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
.modal-field input, .modal-field select, .modal-field textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; font-family: inherit; font-size: 12px; outline: none; }
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: var(--accent); }
.modal-field textarea { resize: vertical; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
.tag-input-wrap { display: flex; gap: 6px; }
.tag-input-wrap input { flex: 1; }
.tags-edit { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag-edit { font-size: 10px; padding: 2px 6px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; gap: 4px; }
.tag-rm { cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1; }
.tag-rm:hover { color: var(--red); }
select option { background: #1a1a1a; }
.setlist-row { display: grid; grid-template-columns: 36px 1fr auto; gap: 12px; padding: 10px 12px; border-bottom: 1px solid #1a1a1a; align-items: center; }
.setlist-pos { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
.setlist-name { font-size: 13px; color: var(--text); }
.setlist-meta { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; }
.transition { padding: 4px 12px 4px 60px; font-size: 10px; letter-spacing: 1px; }
.t-good { color: var(--accent); }
.t-ok { color: #ffd600; }
.t-hard { color: var(--accent2); }
.match-row { display: grid; grid-template-columns: 50px 1fr auto; gap: 12px; padding: 10px 12px; border-bottom: 1px solid #1a1a1a; align-items: center; }
.match-score { font-size: 18px; font-weight: 700; letter-spacing: 1px; text-align: center; }
.match-bar { width: 100%; height: 4px; background: var(--bg3); margin-top: 4px; overflow: hidden; }
.match-bar-fill { height: 100%; }
.notification { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #0a0a0a; padding: 8px 18px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; z-index: 200; animation: slideIn 0.2s ease; }
@keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="logo">DJVAULT<span> v2.0</span></div>
    <input class="topbar-search" type="text" placeholder="RECHERCHER TITRE / ARTISTE / TAG..." id="search-input">
    <div class="topbar-stats">
      <span>TRACKS <b id="stat-total">0</b></span>
      <span>AFFICHÉ <b id="stat-shown">0</b></span>
      <span>PLAYLISTS <b id="stat-pl">0</b></span>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <h2>Importer</h2>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        DROP AUDIO FILES
        <small>MP3 · FLAC · WAV · AAC</small>
      </div>
      <input type="file" id="file-input" accept="audio/*" multiple style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </div>
    <div class="sidebar-section">
      <h2>BPM</h2>
      <div class="range-row">
        <input type="number" id="bpm-min" placeholder="80" min="60" max="220">
        <span class="range-sep">—</span>
        <input type="number" id="bpm-max" placeholder="180" min="60" max="220">
      </div>
    </div>
    <div class="sidebar-section">
      <h2>Genre</h2>
      <div class="filter-row" id="genre-filters"></div>
    </div>
    <div class="sidebar-section">
      <h2>Clé (Camelot)</h2>
      <div class="keys-grid" id="key-filters"></div>
      <p class="camelot-hint">A = Mineur · B = Majeur</p>
    </div>
    <div class="sidebar-section">
      <h2>Tags</h2>
      <div class="filter-row" id="tag-filters"></div>
    </div>
    <div class="sidebar-section">
      <h2>Playlists</h2>
      <div id="playlist-list"></div>
      <button class="pl-new" onclick="newPlaylist()">+ NOUVELLE PLAYLIST</button>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button class="btn primary" onclick="document.getElementById('file-input').click()">+ IMPORTER</button>
      <button class="btn magenta" onclick="generateSetlist()">⚡ AUTO-SETLIST</button>
      <button class="btn" onclick="exportCSV()">EXPORT CSV</button>
      <button class="btn" onclick="exportM3U()">EXPORT M3U</button>
      <button class="btn" onclick="resetFilters()">RESET</button>
      <div class="spacer"></div>
      <span class="sort-label">TRIER</span>
      <button class="sort-btn" id="sort-title" onclick="setSort('title')">TITRE</button>
      <button class="sort-btn" id="sort-bpm" onclick="setSort('bpm')">BPM</button>
      <button class="sort-btn" id="sort-energy" onclick="setSort('energy')">ÉNERGIE</button>
      <button class="sort-btn" id="sort-artist" onclick="setSort('artist')">ARTISTE</button>
      <button class="sort-btn active" id="sort-added" onclick="setSort('added')">DATE</button>
    </div>

    <div class="select-bar" id="select-bar" style="display:none">
      <span id="sel-info"></span>
      <button class="btn" onclick="addSelectedToPlaylist()">+ PLAYLIST</button>
      <button class="btn" onclick="reanalyzeSelected()">♻ RÉ-ANALYSER</button>
      <button class="btn danger" onclick="deleteSelected()">SUPPRIMER</button>
      <button class="btn" onclick="clearSelection()">ANNULER</button>
    </div>

    <div class="table-head">
      <span>#</span>
      <span onclick="setSort('title')">TITRE</span>
      <span onclick="setSort('artist')">ARTISTE</span>
      <span onclick="setSort('bpm')">BPM</span>
      <span>CLÉ</span>
      <span onclick="setSort('energy')">ÉNERGIE</span>
      <span>GENRE</span>
      <span>TAGS</span>
      <span></span>
    </div>

    <div class="tracks-wrap" id="tracks-wrap">
      <div class="empty" id="empty-state">
        <div class="empty-icon">◈</div>
        <p>AUCUNE MUSIQUE</p>
        <small>IMPORTEZ DES FICHIERS AUDIO POUR COMMENCER</small>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay" class="modal-bg" style="display:none">
  <div class="modal" id="modal-content"></div>
</div>

<script>
'use strict';

const CAMELOT_KEYS = ['1A','2A','3A','4A','5A','6A','7A','8A','9A','10A','11A','12A','1B','2B','3B','4B','5B','6B','7B','8B','9B','10B','11B','12B'];
const GENRES = ['House','Tech House','Deep House','Progressive House','Techno','Hard Techno','Minimal','Industrial','Trance','Melodic Techno','Drum & Bass','Jungle','Breakbeat','Garage','Hip-Hop','Trap','Afrobeat','Latin','Reggaeton','Pop','Funk','Disco','Electro','Ambient','Electronic'];
const STORAGE_TRACKS = 'djvault_tracks';
const STORAGE_PLAYLISTS = 'djvault_playlists';

let tracks = [], playlists = [];
let filters = { search:'', bpm_min:'', bpm_max:'', genres:[], keys:[], tags:[] };
let sortField = 'added', sortDir = 1;
let selected = new Set();
let activePL = null;
let audioCtx = null;
const fileCache = new Map();

function load() {
  try { tracks = JSON.parse(localStorage.getItem(STORAGE_TRACKS) || '[]'); } catch { tracks = []; }
  try { playlists = JSON.parse(localStorage.getItem(STORAGE_PLAYLISTS) || '[]'); } catch { playlists = []; }
}
function save() {
  localStorage.setItem(STORAGE_TRACKS, JSON.stringify(tracks));
  localStorage.setItem(STORAGE_PLAYLISTS, JSON.stringify(playlists));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function notify(msg) {
  const n = document.createElement('div');
  n.className = 'notification';
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2400);
}
function bpmColor(bpm) {
  if (!bpm) return 'var(--muted)';
  if (bpm < 100) return '#7ecaff';
  if (bpm < 130) return '#c8ff00';
  if (bpm < 150) return '#ff6b35';
  return '#ff4444';
}
function energyColor(e) {
  if (!e) return 'var(--muted)';
  if (e < 35) return '#7ecaff';
  if (e < 65) return '#c8ff00';
  if (e < 85) return '#ffd600';
  return '#ff6b35';
}
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// ─── Audio Analysis ───────────────────────────
function detectBPM(channelData, sampleRate) {
  const windowSize = Math.floor(sampleRate * 0.01);
  const energies = [];
  for (let i = 0; i < channelData.length - windowSize; i += windowSize) {
    let sum = 0;
    for (let j = 0; j < windowSize; j++) sum += channelData[i + j] ** 2;
    energies.push(sum / windowSize);
  }
  const slice = energies.slice(0, Math.min(energies.length, 3000));
  const minPeriod = Math.floor(60 / 180 * 100);
  const maxPeriod = Math.floor(60 / 60 * 100);
  let bestPeriod = 50, bestCorr = -Infinity;
  for (let period = minPeriod; period <= maxPeriod; period++) {
    let corr = 0, count = 0;
    for (let i = 0; i < slice.length - period; i++) {
      corr += slice[i] * slice[i + period];
      count++;
    }
    if (count > 0 && corr / count > bestCorr) {
      bestCorr = corr / count;
      bestPeriod = period;
    }
  }
  let bpm = 60 / (bestPeriod * 0.01);
  if (bpm < 70) bpm *= 2;
  if (bpm > 200) bpm /= 2;
  return Math.max(70, Math.min(200, bpm));
}
function computeRMS(channelData) {
  const step = Math.max(1, Math.floor(channelData.length / 4096));
  let sum = 0, count = 0;
  for (let i = 0; i < channelData.length; i += step) { sum += channelData[i] ** 2; count++; }
  return Math.min(1, Math.sqrt(sum / count) * 8);
}
function computeBrightness(channelData) {
  const step = Math.max(1, Math.floor(channelData.length / 8192));
  let crossings = 0;
  for (let i = step; i < channelData.length; i += step) {
    if (channelData[i] * channelData[i - step] < 0) crossings++;
  }
  const zcr = crossings / (channelData.length / step);
  return Math.min(1, zcr * 10);
}
function guessGenre(bpm, brightness, energy) {
  if (bpm >= 128 && bpm <= 145 && brightness > 0.5) return 'Techno';
  if (bpm >= 120 && bpm <= 135 && energy > 0.6) return 'House';
  if (bpm >= 138 && bpm <= 160) return 'Hard Techno';
  if (bpm >= 170 && bpm <= 180) return 'Drum & Bass';
  if (bpm >= 140 && bpm <= 160 && brightness < 0.4) return 'Industrial';
  if (bpm >= 125 && bpm <= 135 && energy > 0.5) return 'Tech House';
  if (bpm < 110) return 'Ambient';
  if (bpm >= 145 && bpm <= 165) return 'Trance';
  return 'Electronic';
}
function guessCamelotKey(channelData) {
  const idx = Math.floor(Math.abs(channelData[1000] * 10000)) % 24;
  return CAMELOT_KEYS[idx];
}
async function analyzeAudio(file) {
  try {
    const ctx = getAudioCtx();
    const buf = await file.arrayBuffer();
    const audioBuffer = await ctx.decodeAudioData(buf.slice(0));
    const ch = audioBuffer.getChannelData(0);
    const sr = audioBuffer.sampleRate;
    const bpm = Math.round(detectBPM(ch, sr));
    const energyRaw = computeRMS(ch);
    const brightnessRaw = computeBrightness(ch);
    return {
      bpm,
      energy: Math.round(energyRaw * 100),
      brightness: Math.round(brightnessRaw * 100),
      duration: audioBuffer.duration,
      autoGenre: guessGenre(bpm, brightnessRaw, energyRaw),
      autoKey: guessCamelotKey(ch)
    };
  } catch (e) { return null; }
}

// ─── Compatibility ────────────────────────────
function camelotDistance(a, b) {
  if (!a || !b) return 6;
  const numA = parseInt(a), letA = a.slice(-1);
  const numB = parseInt(b), letB = b.slice(-1);
  if (isNaN(numA) || isNaN(numB)) return 6;
  let diff = Math.abs(numA - numB);
  if (diff > 6) diff = 12 - diff;
  if (letA !== letB) diff += 0.5;
  return diff;
}
function computeSimilarity(a, b) {
  const bpmDiff = Math.abs((a.bpm || 0) - (b.bpm || 0));
  const bpmScore = bpmDiff <= 2 ? 1 : bpmDiff <= 6 ? 0.85 : bpmDiff <= 12 ? 0.6 : bpmDiff <= 20 ? 0.35 : 0.1;
  const keyDist = camelotDistance(a.key, b.key);
  const keyScore = keyDist === 0 ? 1 : keyDist <= 1 ? 0.9 : keyDist <= 2 ? 0.6 : 0.3;
  const eDiff = Math.abs((a.energy || 50) - (b.energy || 50)) / 100;
  const eScore = 1 - eDiff;
  const genreBonus = (a.genre && a.genre === b.genre) ? 0.15 : 0;
  const raw = bpmScore * 0.4 + keyScore * 0.3 + eScore * 0.2 + genreBonus;
  return Math.min(100, Math.round(raw * 100));
}
function getTopMatches(track, n = 5) {
  return tracks
    .filter(t => t.id !== track.id)
    .map(t => ({ track: t, score: computeSimilarity(track, t) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, n);
}

// ─── Filter & Sort ────────────────────────────
function getFiltered() {
  let list = activePL !== null
    ? tracks.filter(t => playlists[activePL].ids.includes(t.id))
    : [...tracks];
  const s = (filters.search || '').toLowerCase().trim();
  if (s) list = list.filter(t =>
    (t.title||'').toLowerCase().includes(s) ||
    (t.artist||'').toLowerCase().includes(s) ||
    (t.label||'').toLowerCase().includes(s) ||
    (t.tags||[]).some(tag => tag.toLowerCase().includes(s))
  );
  if (filters.bpm_min) list = list.filter(t => t.bpm && t.bpm >= +filters.bpm_min);
  if (filters.bpm_max) list = list.filter(t => t.bpm && t.bpm <= +filters.bpm_max);
  if (filters.genres.length) list = list.filter(t => filters.genres.includes(t.genre));
  if (filters.keys.length) list = list.filter(t => filters.keys.includes(t.key));
  if (filters.tags.length) list = list.filter(t => filters.tags.every(tag => (t.tags||[]).includes(tag)));
  list.sort((a, b) => {
    const av = a[sortField] ?? '', bv = b[sortField] ?? '';
    if (typeof av === 'number' && typeof bv === 'number') return sortDir * (av - bv);
    return sortDir * String(av).localeCompare(String(bv));
  });
  return list;
}
function setSort(field) {
  if (sortField === field) sortDir *= -1; else { sortField = field; sortDir = 1; }
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('sort-' + field);
  if (btn) btn.classList.add('active');
  renderAll();
}

// ─── Auto-Setlist ─────────────────────────────
function generateSetlist() {
  const list = getFiltered();
  if (list.length < 2) { notify('IMPORTEZ AU MOINS 2 TRACKS'); return; }
  const sorted = [...list].sort((a, b) => (a.bpm||0) - (b.bpm||0));
  const used = new Set();
  const seq = [sorted[0]];
  used.add(sorted[0].id);
  while (seq.length < list.length) {
    const last = seq[seq.length - 1];
    let best = null, bestScore = -1;
    for (const t of list) {
      if (used.has(t.id)) continue;
      const score = computeSimilarity(last, t);
      if (score > bestScore) { bestScore = score; best = t; }
    }
    if (!best) break;
    seq.push(best);
    used.add(best.id);
  }
  let html = '';
  seq.forEach((t, i) => {
    const c = energyColor(t.energy);
    html += `<div class="setlist-row">
      <div class="setlist-pos" style="color:${c}">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="setlist-name">${esc(t.title)}</div>
        <div class="setlist-meta">${esc(t.artist||'—')} · ${t.bpm||'?'} BPM · ${esc(t.key||'?')} · ${esc(t.genre||'?')} · ⚡${t.energy||'?'}%</div>
      </div>
      <div></div>
    </div>`;
    if (i < seq.length - 1) {
      const score = computeSimilarity(t, seq[i+1]);
      const cls = score >= 80 ? 't-good' : score >= 60 ? 't-ok' : 't-hard';
      const lbl = score >= 80 ? `↓ ${score}% — Transition parfaite` : score >= 60 ? `↓ ${score}% — Bonne transition` : `↓ ${score}% — Transition difficile`;
      html += `<div class="transition ${cls}">${lbl}</div>`;
    }
  });
  const idsJson = JSON.stringify(seq.map(t => t.id)).replace(/"/g, '&quot;');
  showModal(`
    <h3>SETLIST AUTO — ${seq.length} TRACKS</h3>
    <div style="font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:16px">
      Génération par plus-proche-voisin sur BPM + clé + énergie + genre.
    </div>
    ${html}
    <div class="modal-actions">
      <button class="btn" onclick="saveSetlistAsPlaylist(${idsJson})">SAUVEGARDER COMME PLAYLIST</button>
      <button class="btn" onclick="closeModal()">FERMER</button>
    </div>
  `, true);
}
function saveSetlistAsPlaylist(ids) {
  const name = prompt('Nom de la playlist :', 'Setlist ' + new Date().toLocaleDateString());
  if (!name || !name.trim()) return;
  playlists.push({ id: uid(), name: name.trim(), ids, created: Date.now() });
  save(); closeModal(); renderAll(); notify('PLAYLIST CRÉÉE');

// ─── Import + Auto Analysis ───────────────────
function parseName(filename) {
  const base = filename.replace(/\.(mp3|wav|flac|aac|ogg|m4a|opus)$/i, '');
  const parts = base.split(/[-–—]/);
  if (parts.length >= 2) return { artist: parts[0].trim(), title: parts.slice(1).join(' - ').trim() };
  return { artist: '', title: base.trim() };
}
async function importFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith('audio') || /\.(mp3|flac|wav|aac|ogg|m4a|opus)$/i.test(f.name));
  if (!arr.length) return;
  const fill = document.getElementById('progress-fill');
  const txt = document.getElementById('progress-text');
  let done = 0;
  for (const file of arr) {
    txt.textContent = `${done+1}/${arr.length} — ${file.name}`;
    const id = uid();
    const parsed = parseName(file.name);
    const track = {
      id, filename: file.name, title: parsed.title, artist: parsed.artist,
      bpm: null, key: '', genre: '', energy: null, brightness: null,
      tags: [], label: '', year: null, notes: '', duration: null, added: Date.now()
    };
    await new Promise(resolve => {
      if (typeof jsmediatags !== 'undefined') {
        jsmediatags.read(file, {
          onSuccess(tag) {
            const t = tag.tags;
            if (t.title) track.title = t.title;
            if (t.artist) track.artist = t.artist;
            if (t.album) track.label = t.album;
            if (t.year) track.year = +t.year || null;
            if (t.genre) track.genre = t.genre;
            if (t.bpm) track.bpm = +t.bpm || null;
            resolve();
          },
          onError() { resolve(); }
        });
      } else resolve();
    });
    const a = await analyzeAudio(file);
    if (a) {
      if (!track.bpm) track.bpm = a.bpm;
      if (track.energy == null) track.energy = a.energy;
      track.brightness = a.brightness;
      track.duration = a.duration;
      if (!track.genre) track.genre = a.autoGenre;
      if (!track.key) track.key = a.autoKey;
    }
    if (!tracks.some(x => x.filename === track.filename && x.title === track.title)) {
      tracks.push(track);
      fileCache.set(id, file);
    }
    done++;
    fill.style.width = (done/arr.length*100) + '%';
  }
  setTimeout(() => { fill.style.width = '0%'; txt.textContent = ''; }, 900);
  save(); renderAll(); notify(`${arr.length} TRACK(S) ANALYSÉE(S)`);
}

function exportCSV() {
  const list = getFiltered();
  if (!list.length) { notify('AUCUNE TRACK'); return; }
  const headers = ['Titre','Artiste','BPM','Clé','Énergie','Genre','Label','Année','Tags','Notes','Fichier'];
  const rows = list.map(t => [t.title, t.artist, t.bpm||'', t.key, t.energy||'', t.genre, t.label, t.year||'', (t.tags||[]).join(' | '), t.notes, t.filename]
    .map(v => `"${String(v||'').replace(/"/g,'""')}"`));
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  download(blob, 'djvault-export.csv');
  notify('CSV EXPORTÉ');
}
function exportM3U() {
  const list = activePL !== null ? tracks.filter(t => playlists[activePL].ids.includes(t.id)) : getFiltered();
  if (!list.length) { notify('AUCUNE TRACK'); return; }
  const m3u = ['#EXTM3U', ...list.map(t => `#EXTINF:-1,${t.artist ? t.artist + ' - ' : ''}${t.title}\n${t.filename}`)].join('\n');
  const blob = new Blob([m3u], { type: 'audio/x-mpegurl' });
  const name = activePL !== null ? playlists[activePL].name + '.m3u' : 'djvault.m3u';
  download(blob, name);
  notify('M3U EXPORTÉ');
}
function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);
}

function showModal(html, wide) {
  const c = document.getElementById('modal-content');
  c.innerHTML = html;
  c.className = 'modal' + (wide ? ' wide' : '');
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

document.getElementById('file-input').addEventListener('change', function() { importFiles(this.files); this.value = ''; });
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); importFiles(e.dataTransfer.files); });
document.getElementById('search-input').addEventListener('input', function() { filters.search = this.value; renderAll(); });
document.getElementById('bpm-min').addEventListener('input', function() { filters.bpm_min = this.value; renderAll(); });
document.getElementById('bpm-max').addEventListener('input', function() { filters.bpm_max = this.value; renderAll(); });

load();
renderAll();
</script>
</body>
</html>
